# Window rules
# Current Hyprland syntax: windowrule = match:<prop> <regex>, <effect> [args]
# See: https://wiki.hypr.land/0.54.0/Configuring/Window-Rules/

# Floating dialogs / utility windows
windowrule = match:class ^(file_progress|confirm|dialog|download|notification|error|splash|confirmreset)$, float on
windowrule = match:title ^(Open File|branchdialog)$, float on
windowrule = match:class ^(Lxappearance|viewnior|feh|pavucontrol-qt|pavucontrol|file-roller)$, float on

# Rofi
windowrule = match:class ^(Rofi)$, opacity 0.90 0.90, allows_input on, float on, no_anim on

# Opacity
windowrule = match:class ^(kitty)$, opacity 0.90 0.90

# Idle inhibit
windowrule = match:class ^(mpv)$, idle_inhibit focus
windowrule = match:class ^(firefox)$, idle_inhibit fullscreen

# Title-specific utility windows
windowrule = match:title ^(Media viewer)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Volume Control)$, float on, size 800 600, move 75 44%

# Logout overlay
windowrule = match:class ^(wlogout)$, fullscreen on
windowrule = match:title ^(wlogout)$, float on, fullscreen on

# Workspace / special rules
windowrule = match:class ^(Nytrix)$, workspace 1 silent, no_initial_focus on
windowrule = match:class ^(floatterm)$, workspace special silent, float on, center on, size 45% 60%
