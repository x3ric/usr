# System
bind = SUPER, Q, killactive
bind = SUPER SHIFT, Q, exit
bind = SUPER, F1, exec, ~/.config/hypr/keybind
bind = SUPER, V, exec, nwg-clipman
bind = SUPER, B, exec, pgrep -x waybar >/dev/null && pkill waybar || waybar

# Launchers
bind = SUPER, Return, exec, $TERMINAL
bind = SUPER, E, exec, code
bind = SUPER SHIFT, E, exec, emacs
bind = SUPER, F3, exec, rofi -show drun -theme applications -show-icons
bind = SUPER, COMMA, exec, rofi -modi emoji -show emoji -theme x
bind = SUPER, W, exec, $BROWSER
bind = SUPER, A, exec, pavucontrol
bind = SUPER SHIFT, RETURN, exec, $FILEMGR
bind = SUPER SHIFT, ESCAPE, exec, $TERMINAL --start-as maximized btop
bind = SUPER SHIFT, P, exec, $TERMINAL --start-as maximized btop

# Window management
bind = SUPER, M, fullscreen
bind = SUPER SHIFT, M, fullscreenstate, 2
bind = SUPER, G, togglegroup
bind = SUPER, TAB, changegroupactive
bind = SUPER, F, togglefloating
bind = SUPER, SPACE, exec, ~/.config/hypr/layout-cycle
bind = SUPER SHIFT, SPACE, exec, hyprctl dispatch layoutmsg swapwithmaster

# Workspace-local index window cycling: not geometry-direction based.
bind = SUPER, UP, exec, ~/.config/hypr/window-cycle prev
bind = SUPER, DOWN, exec, ~/.config/hypr/window-cycle next
bind = SUPER SHIFT, UP, swapnext, prev
bind = SUPER SHIFT, DOWN, swapnext

# Workspace movement stays on horizontal arrows.
bind = SUPER, LEFT, workspace, -1
bind = SUPER, RIGHT, workspace, +1
bind = SUPER SHIFT, LEFT, movetoworkspace, -1
bind = SUPER SHIFT, RIGHT, movetoworkspace, +1

# Hide/show helpers
bind = SUPER, H, exec, ~/.config/hypr/hide h
bind = SUPER, I, exec, ~/.config/hypr/hide s

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Media keys
binde = , XF86MonBrightnessUp, exec, brightnessctl set +1% -e
binde = , XF86MonBrightnessDown, exec, brightnessctl set 1%- -n 1 -e
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binde = , XF86AudioPlay, exec, ~/.config/hypr/media-key.sh PlayPause
binde = , XF86AudioNext, exec, ~/.config/hypr/media-key.sh Next
binde = , XF86AudioPrev, exec, ~/.config/hypr/media-key.sh Previous
binde = , XF86AudioStop, exec, ~/.config/hypr/media-key.sh Stop

# Mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Screenshots
bind = SUPER, Print, exec, grimblast --notify --cursor copysave output
bind = SUPER ALT, Print, exec, grimblast --notify --cursor copysave screen
bind = SUPER SHIFT, Print, exec, grimblast --notify copysave area
bind = SUPER CONTROL, Print, exec, grimblast --notify --cursor copysave active

# Helpers
bind = SUPER, D, exec, ~/.config/hypr/desktop-menu.sh
bind = SUPER, U, exec, hyprctl dispatch focusurgentorlast
bind = SUPER, Escape, exec, hyprctl dispatch togglespecialworkspace
bind = SUPER SHIFT, X, exec, wlogout
bind = SUPER SHIFT, R, exec, ~/.config/hypr/bg && ~/.config/hypr/update-border.sh
bind = SUPER, F5, exec, $TERMINAL --class floatterm
bind = SUPER SHIFT, C, exec, hyprpicker -a || grim -g "$(slurp -p)" -t - | convert - -format '%[pixel:p{0,0}]' info:- | tr -d '\n' | wl-copy
